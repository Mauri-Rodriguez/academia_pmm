name: CI de PMM Interactivo

# 1. Define cuándo se ejecuta el workflow
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 2. Configura los servicios necesarios (Base de datos temporal)
    services:
      mysql:
        image: mysql:8.0
        env:
          # VUELVE A PONER "root", SI LO DEJAS VACÍO EL CONTENEDOR HACE CRASH
          MYSQL_ROOT_PASSWORD: "root"
          MYSQL_DATABASE: pmm_interactivo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=3

    steps:
    # 3. Descarga tu código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 4. Instala Node.js
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    # 5. Instala las dependencias y ejecuta Jest
    - name: Instalar dependencias y ejecutar pruebas
      run: |
        cd pmm-backend
        npm install
        npm test
      env:
        # Variables de entorno necesarias para que el backend no falle
        NODE_ENV: test
        DB_HOST: 127.0.0.1   # CAMBIADO DE LOCALHOST A LA IP TCP
        DB_USER: root
        DB_PASSWORD: "root"  # DEBE COINCIDIR CON MYSQL_ROOT_PASSWORD
        DB_NAME: pmm_interactivo
        DB_DIALECT: mysql
        JWT_SECRET: una_cadena_secreta_muy_segura_para_pmm_2026